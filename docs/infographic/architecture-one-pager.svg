<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="900" viewBox="0 0 1680 900" font-family="'DejaVu Sans', system-ui, sans-serif">
  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M1 1 L8 5 L1 9" fill="none" stroke="#7d8f99" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="mt" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M1 1 L8 5 L1 9" fill="none" stroke="#33d6c2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="mr" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M1 1 L8 5 L1 9" fill="none" stroke="#e07d77" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="mg" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M1 1 L8 5 L1 9" fill="none" stroke="#e7b24a" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <!-- background -->
  <rect width="1680" height="900" fill="#0e141b"/>
  <rect width="1680" height="6" fill="#33d6c2" opacity="0.9"/>

  <!-- header -->
  <text x="48" y="56" font-size="30" font-weight="700" fill="#e2e9ec">LoopLab<tspan fill="#7d8f99" font-weight="400"> — architecture</tspan></text>
  <text x="48" y="82" font-size="14.5" fill="#9fb0b6" font-family="ui-monospace,'DejaVu Sans Mono',monospace">autonomous ML/DS research engine · invent → implement → test → improve ↺ · files are the source of truth</text>

  <!-- ============================ INPUT ============================ -->
  <g>
    <rect x="40" y="270" width="232" height="176" rx="14" fill="#16202b" stroke="#283644"/>
    <text x="62" y="300" font-size="12" letter-spacing="2" fill="#6b7d87" font-family="ui-monospace,'DejaVu Sans Mono',monospace">INPUT</text>
    <text x="62" y="328" font-size="18" font-weight="700" fill="#e2e9ec">Task / Genesis</text>
    <text x="62" y="356" font-size="13" fill="#9fb0b6">goal · data · metric · direction</text>
    <text x="62" y="378" font-size="13" fill="#9fb0b6">edit-surface (allow-list)</text>
    <line x1="62" y1="396" x2="250" y2="396" stroke="#283644"/>
    <text x="62" y="420" font-size="12" fill="#7d8f99" font-family="ui-monospace,'DejaVu Sans Mono',monospace">→ config.snapshot.json</text>
    <text x="62" y="437" font-size="12" fill="#7d8f99" font-family="ui-monospace,'DejaVu Sans Mono',monospace">  (masked · resumable)</text>
  </g>
  <path d="M272 358 L306 358" fill="none" stroke="#7d8f99" stroke-width="2" marker-end="url(#m)"/>

  <!-- ============================ ORCHESTRATOR ============================ -->
  <rect x="310" y="112" width="784" height="500" rx="18" fill="#0f1922" stroke="#2b3b48"/>
  <text x="332" y="140" font-size="12.5" letter-spacing="2" fill="#33d6c2" font-family="ui-monospace,'DejaVu Sans Mono',monospace">ORCHESTRATOR</text>
  <text x="332" y="160" font-size="12.5" fill="#6b7d87" font-family="ui-monospace,'DejaVu Sans Mono',monospace">sole writer · budget · stop-conditions · crash-resume</text>

  <!-- loop ring arrows (center 700,362 · role centers r54) -->
  <path d="M738 268 Q792 274 796 324" fill="none" stroke="#7d8f99" stroke-width="2" marker-end="url(#m)"/>
  <path d="M796 400 Q792 450 740 456" fill="none" stroke="#7d8f99" stroke-width="2" marker-end="url(#m)"/>
  <path d="M662 456 Q610 450 606 400" fill="none" stroke="#7d8f99" stroke-width="2" marker-end="url(#m)"/>
  <path d="M606 324 Q610 274 662 268" fill="none" stroke="#7d8f99" stroke-width="2" marker-end="url(#m)"/>
  <text x="792" y="300" font-size="11" fill="#6b7d87" font-family="ui-monospace,'DejaVu Sans Mono',monospace">idea</text>
  <text x="792" y="432" font-size="11" fill="#6b7d87" font-family="ui-monospace,'DejaVu Sans Mono',monospace">run</text>
  <text x="576" y="432" font-size="11" fill="#6b7d87" font-family="ui-monospace,'DejaVu Sans Mono',monospace">result</text>
  <text x="576" y="300" font-size="11" fill="#6b7d87" font-family="ui-monospace,'DejaVu Sans Mono',monospace">verdict</text>

  <!-- repair back-edge (Sandbox -> Developer) -->
  <path d="M750 452 Q902 420 812 402" fill="none" stroke="#e07d77" stroke-width="1.8" stroke-dasharray="6 6" marker-end="url(#mr)"/>
  <text x="878" y="470" font-size="11" fill="#e07d77" font-family="ui-monospace,'DejaVu Sans Mono',monospace">repair ↺</text>

  <!-- policy pick (Policy -> Researcher) -->
  <path d="M700 322 L700 288" fill="none" stroke="#33d6c2" stroke-width="2" marker-end="url(#mt)"/>
  <text x="710" y="308" font-size="10.5" fill="#33d6c2" font-family="ui-monospace,'DejaVu Sans Mono',monospace">pick</text>

  <!-- role: Researcher (top) -->
  <circle cx="700" cy="228" r="54" fill="#211d39" stroke="#9285f2" stroke-width="2"/>
  <text x="700" y="216" text-anchor="middle" font-size="10" font-weight="700" fill="#9285f2" font-family="ui-monospace,'DejaVu Sans Mono',monospace">PROPOSE</text>
  <text x="700" y="234" text-anchor="middle" font-size="14.5" font-weight="700" fill="#e2e9ec">Researcher</text>
  <text x="700" y="251" text-anchor="middle" font-size="10.5" fill="#9fb0b6">idea + params</text>
  <!-- role: Developer (right) -->
  <circle cx="832" cy="362" r="54" fill="#15273a" stroke="#5aa6f5" stroke-width="2"/>
  <text x="832" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#5aa6f5" font-family="ui-monospace,'DejaVu Sans Mono',monospace">BUILD</text>
  <text x="832" y="368" text-anchor="middle" font-size="14.5" font-weight="700" fill="#e2e9ec">Developer</text>
  <text x="832" y="385" text-anchor="middle" font-size="10.5" fill="#9fb0b6">writes code</text>
  <!-- role: Sandbox (bottom) -->
  <circle cx="700" cy="496" r="54" fill="#0f322f" stroke="#33c6ba" stroke-width="2"/>
  <text x="700" y="484" text-anchor="middle" font-size="10" font-weight="700" fill="#33c6ba" font-family="ui-monospace,'DejaVu Sans Mono',monospace">RUN</text>
  <text x="700" y="502" text-anchor="middle" font-size="14.5" font-weight="700" fill="#e2e9ec">Sandbox</text>
  <text x="700" y="519" text-anchor="middle" font-size="10.5" fill="#9fb0b6">isolated · timed</text>
  <!-- role: Evaluator (left) -->
  <circle cx="568" cy="362" r="54" fill="#13301c" stroke="#63cf7f" stroke-width="2"/>
  <text x="568" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#63cf7f" font-family="ui-monospace,'DejaVu Sans Mono',monospace">SCORE</text>
  <text x="568" y="368" text-anchor="middle" font-size="14.5" font-weight="700" fill="#e2e9ec">Evaluator</text>
  <text x="568" y="385" text-anchor="middle" font-size="10.5" fill="#9fb0b6">CV + gate</text>
  <!-- center: Policy hub -->
  <rect x="638" y="322" width="124" height="80" rx="12" fill="#1a1710" stroke="#c79a5a" stroke-width="1.6"/>
  <text x="700" y="346" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c79a5a" font-family="ui-monospace,'DejaVu Sans Mono',monospace">PICK NEXT</text>
  <text x="700" y="365" text-anchor="middle" font-size="13.5" font-weight="700" fill="#e2e9ec">Policy</text>
  <text x="700" y="382" text-anchor="middle" font-size="10" fill="#9fb0b6">greedy tree</text>
  <text x="700" y="396" text-anchor="middle" font-size="9" fill="#6b7d87" font-family="ui-monospace,'DejaVu Sans Mono',monospace">+ strategist ✧</text>

  <!-- arrow orchestrator -> output -->
  <path d="M1094 300 L1150 240" fill="none" stroke="#7d8f99" stroke-width="2" marker-end="url(#m)"/>
  <text x="1100" y="256" font-size="10.5" fill="#7d8f99" font-family="ui-monospace,'DejaVu Sans Mono',monospace">budget spent</text>

  <!-- ============================ OUTPUT ============================ -->
  <g>
    <rect x="1150" y="180" width="490" height="86" rx="12" fill="#16202b" stroke="#283644"/>
    <text x="1172" y="208" font-size="11.5" letter-spacing="1.5" fill="#63cf7f" font-family="ui-monospace,'DejaVu Sans Mono',monospace">CONFIRM</text>
    <text x="1172" y="232" font-size="15" font-weight="700" fill="#e2e9ec">Multi-seed · top-k</text>
    <text x="1172" y="252" font-size="12" fill="#9fb0b6">re-run top candidates · promote only if &gt; 1 SE</text>
  </g>
  <path d="M1395 266 L1395 296" fill="none" stroke="#7d8f99" stroke-width="2" marker-end="url(#m)"/>
  <g>
    <rect x="1150" y="298" width="490" height="98" rx="12" fill="#211b0f" stroke="#e7b24a" stroke-width="1.7"/>
    <text x="1172" y="326" font-size="11.5" letter-spacing="1.5" fill="#e7b24a" font-family="ui-monospace,'DejaVu Sans Mono',monospace">CHAMPION</text>
    <text x="1172" y="352" font-size="17" font-weight="700" fill="#e2e9ec">🏆 Best verified result</text>
    <text x="1172" y="374" font-size="12" fill="#c9b78a">reported with variance · metric ± CI · reproducible</text>
  </g>
  <path d="M1395 396 L1395 426" fill="none" stroke="#e7b24a" stroke-width="2" marker-end="url(#mg)"/>
  <g>
    <rect x="1150" y="428" width="490" height="86" rx="12" fill="#16202b" stroke="#283644"/>
    <text x="1172" y="456" font-size="11.5" letter-spacing="1.5" fill="#33d6c2" font-family="ui-monospace,'DejaVu Sans Mono',monospace">REFLECT + EXPORT</text>
    <text x="1172" y="480" font-size="15" font-weight="700" fill="#e2e9ec">cases · lessons · skills</text>
    <text x="1172" y="500" font-size="12" fill="#9fb0b6">tree.html · MLflow · notebook · cross-run memory</text>
  </g>

  <!-- ============================ EVENT LOG SPINE ============================ -->
  <path d="M702 612 L702 648" fill="none" stroke="#33d6c2" stroke-width="2.2" marker-end="url(#mt)"/>
  <text x="712" y="636" font-size="11" fill="#33d6c2" font-family="ui-monospace,'DejaVu Sans Mono',monospace">append every step</text>
  <rect x="40" y="650" width="1600" height="86" rx="14" fill="#0d2321" stroke="#1f5b54"/>
  <text x="66" y="682" font-size="19" font-weight="700" fill="#33d6c2" font-family="ui-monospace,'DejaVu Sans Mono',monospace">events.jsonl</text>
  <text x="66" y="710" font-size="13.5" fill="#8bb5b0">append-only · the single source of truth — every projection is a pure fold of this log</text>
  <g font-family="ui-monospace,'DejaVu Sans Mono',monospace" font-size="12" fill="#cfe6e2">
    <rect x="1030" y="668" width="176" height="50" rx="9" fill="#0f2b28" stroke="#1f5b54"/>
    <text x="1118" y="690" text-anchor="middle">replay</text>
    <text x="1118" y="707" text-anchor="middle" font-size="10" fill="#7fb0aa">⇒ crash-resume</text>
    <rect x="1218" y="668" width="176" height="50" rx="9" fill="#0f2b28" stroke="#1f5b54"/>
    <text x="1306" y="690" text-anchor="middle">read-model</text>
    <text x="1306" y="707" text-anchor="middle" font-size="10" fill="#7fb0aa">UI · DAG</text>
    <rect x="1406" y="668" width="210" height="50" rx="9" fill="#0f2b28" stroke="#1f5b54"/>
    <text x="1511" y="690" text-anchor="middle">spans.jsonl</text>
    <text x="1511" y="707" text-anchor="middle" font-size="10" fill="#7fb0aa">traces · OTel</text>
  </g>

  <!-- ============================ SUBSYSTEMS ============================ -->
  <text x="48" y="772" font-size="12" letter-spacing="2" fill="#6b7d87" font-family="ui-monospace,'DejaVu Sans Mono',monospace">SUBSYSTEMS · WIRED BY CONFIG (each a swappable seam)</text>
  <g font-family="'DejaVu Sans', sans-serif">
    <!-- 1 LLM backend -->
    <rect x="40" y="786" width="306" height="94" rx="12" fill="#16202b" stroke="#283644"/>
    <circle cx="62" cy="812" r="5" fill="#5aa6f5"/>
    <text x="78" y="817" font-size="14.5" font-weight="700" fill="#e2e9ec">LLM Backend</text>
    <text x="60" y="842" font-size="11.5" fill="#9fb0b6">OpenAI-compatible · Ollama / vLLM</text>
    <text x="60" y="861" font-size="11.5" fill="#9fb0b6">per-role &amp; per-stage routing · unified agent</text>
    <!-- 2 search + operators -->
    <rect x="362" y="786" width="306" height="94" rx="12" fill="#16202b" stroke="#283644"/>
    <circle cx="384" cy="812" r="5" fill="#c79a5a"/>
    <text x="400" y="817" font-size="14.5" font-weight="700" fill="#e2e9ec">Search &amp; Operators</text>
    <text x="382" y="842" font-size="11.5" fill="#9fb0b6">greedy tree (asha · mcts · evo)</text>
    <text x="382" y="861" font-size="11.5" fill="#9fb0b6">draft · improve · debug · ablate · merge</text>
    <!-- 3 trust + eval -->
    <rect x="684" y="786" width="306" height="94" rx="12" fill="#16202b" stroke="#283644"/>
    <circle cx="706" cy="812" r="5" fill="#63cf7f"/>
    <text x="722" y="817" font-size="14.5" font-weight="700" fill="#e2e9ec">Trust &amp; Evaluation</text>
    <text x="704" y="842" font-size="11.5" fill="#9fb0b6">consistent CV · leakage checks</text>
    <text x="704" y="861" font-size="11.5" fill="#9fb0b6">variance gate · reward-hack / critic</text>
    <!-- 4 sandbox tiers -->
    <rect x="1006" y="786" width="306" height="94" rx="12" fill="#16202b" stroke="#283644"/>
    <circle cx="1028" cy="812" r="5" fill="#33c6ba"/>
    <text x="1044" y="817" font-size="14.5" font-weight="700" fill="#e2e9ec">Sandbox tiers</text>
    <text x="1026" y="842" font-size="11.5" fill="#9fb0b6">trusted_local — subprocess (default)</text>
    <text x="1026" y="861" font-size="11.5" fill="#9fb0b6">untrusted — Docker · network-off</text>
    <!-- 5 memory + knowledge -->
    <rect x="1328" y="786" width="312" height="94" rx="12" fill="#16202b" stroke="#283644"/>
    <circle cx="1350" cy="812" r="5" fill="#e7b24a"/>
    <text x="1366" y="817" font-size="14.5" font-weight="700" fill="#e2e9ec">Memory &amp; Knowledge</text>
    <text x="1348" y="842" font-size="11.5" fill="#9fb0b6">cases · lessons · meta-notes · skills · KB</text>
    <text x="1348" y="861" font-size="11.5" fill="#9fb0b6">injected + agentically retrieved (memora)</text>
  </g>
</svg>
