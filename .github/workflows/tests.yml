# Run the full offline test suite on every push/PR. The suite needs no external services,
# no API keys, and no Docker (live-LLM tests auto-skip); [ui] is required because the
# server/assistant/TUI tests import fastapi.
name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev,ui]"
      - run: python -m pytest

  # A small second platform leg is deliberate: subprocess/path/locking behavior is materially
  # different on Windows, and Linux-only CI previously missed both a path assertion and a network
  # unit test that expanded into minutes of timeout retries on Windows.
  pytest-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,ui]"
      # CODEX AGENT: This monolithic leg currently reaches about 2,984 passing tests, then waits in
      # threading.Condition and exits via KeyboardInterrupt after roughly eight minutes, while Linux and
      # UI finish green. Isolate the leaking process/timer with deterministic Windows shards plus one
      # --full-trace diagnostic job; until then every master push is red and later failures stay hidden.
      - run: python -m pytest

  ui:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm test
        working-directory: ui
      - name: Build production UI
        run: npm run build
        working-directory: ui
      - name: Enforce bundle budgets
        run: npm run check:bundle
        working-directory: ui
