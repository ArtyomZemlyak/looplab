# Run the full offline test suite on every push/PR. The suite needs no external services,
# no API keys, and no Docker (live-LLM tests auto-skip); [ui] is required because the
# server/assistant/TUI tests import fastapi.
name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev,ui]"
      - run: python -m pytest
